<!DOCTYPE html>
<html>
<head>
    <title>Hospital API Test</title>
</head>
<body>
    <h1>🏥 Sistema Hospital</h1>
    <button onclick="registrarPaciente()">Registrar Paciente</button>
    <button onclick="verPacientes()">Ver Pacientes</button>
    <div id="resultado"></div>

    <script>
        const API = 'https://webyapis-api.onrender.com/api';
        
        async function verPacientes() {
            const res = await fetch(`${API}/pacientes`);
            const data = await res.json();
            document.getElementById('resultado').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
        
        async function registrarPaciente() {
            const nombre = prompt('Nombre:');
            const edad = prompt('Edad:');
            const paciente = { nombre, edad: parseInt(edad), estado: 'Activo' };
            
            const res = await fetch(`${API}/pacientes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(paciente)
            });
            const data = await res.json();
            document.getElementById('resultado').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
